<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端口连接检查执行器</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .button:hover {
            background: #005a9e;
        }
        .output {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 600px;
            overflow-y: auto;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background: #1e3a1e; border-left: 4px solid #4caf50; }
        .error { background: #3a1e1e; border-left: 4px solid #f44336; }
        .warning { background: #3a3a1e; border-left: 4px solid #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 端口连接检查执行器</h1>
        <p>此页面将自动加载并执行端口连接检查脚本</p>
        
        <div class="controls">
            <button class="button" onclick="runDetailedCheck()">🔍 运行详细检查</button>
            <button class="button" onclick="runQuickCheck()">⚡ 运行快速检查</button>
            <button class="button" onclick="clearOutput()">🗑️ 清空输出</button>
        </div>
        
        <div id="status" class="status"></div>
        <div id="output" class="output">正在初始化...</div>
    </div>

    <script>
        let outputDiv = document.getElementById('output');
        let statusDiv = document.getElementById('status');
        
        // 重写console.log来显示在页面上
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToOutput(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'warn' ? '⚠️' : '📝';
            outputDiv.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToOutput(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToOutput(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToOutput(args.join(' '), 'warn');
        };
        
        function setStatus(message, type = 'success') {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }
        
        function clearOutput() {
            outputDiv.textContent = '';
        }
        
        function runDetailedCheck() {
            if (typeof window.checkPortConnections === 'function') {
                console.log('🚀 开始运行详细检查...');
                window.checkPortConnections(true);
            } else {
                console.error('❌ 检查脚本未加载，请先加载脚本');
            }
        }
        
        function runQuickCheck() {
            if (typeof window.checkPortConnections === 'function') {
                console.log('⚡ 开始运行快速检查...');
                window.checkPortConnections(false, true);
            } else {
                console.error('❌ 检查脚本未加载，请先加载脚本');
            }
        }
        
        // 自动加载检查脚本
        async function loadCheckScript() {
            try {
                setStatus('正在加载端口连接检查脚本...', 'warning');
                console.log('🔄 正在加载端口连接检查脚本...');
                
                const response = await fetch('/check-port-connections.js');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const scriptContent = await response.text();
                eval(scriptContent);
                
                setStatus('✅ 端口连接检查脚本加载成功！', 'success');
                console.log('✅ 端口连接检查脚本加载成功！');
                console.log('💡 现在可以点击按钮运行检查了');
                
            } catch (error) {
                setStatus(`❌ 脚本加载失败: ${error.message}`, 'error');
                console.error('❌ 脚本加载失败:', error);
                console.log('💡 请确保在任务创建页面运行此检查');
            }
        }
        
        // 页面加载完成后自动加载脚本
        window.addEventListener('load', () => {
            setTimeout(loadCheckScript, 1000);
        });
    </script>
</body>
</html>
